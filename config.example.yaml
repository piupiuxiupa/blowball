# blowball backend configuration.
# Values support ${VAR} substitution from environment variables.

server:
  port: 8080

openai:
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini

mysql:
  dsn: ${MYSQL_DSN:user:password@tcp(127.0.0.1:3306)/blowball?charset=utf8mb4&parseTime=true&loc=Local}
  host: 127.0.0.1
  port: 3306
  user: root
  password: ""
  dbname: blowball

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

jwt:
  secret: ${JWT_SECRET}
  expire: 7d

agents:
  confuse:
    name: Confuse
    model: gpt-4o-mini
    system_prompt: |
      You are Confuse, the central orchestrator agent.
      You decide which sub-agent to dispatch based on the user's request:
        - Chongzhi: for coding and file editing tasks
        - Liang: for analysis and explanation tasks
      Always pass enough context in the task description so the chosen
      sub-agent can complete the work independently.
    max_tokens: 2048
    tools:
      - xizhi_list_files
      - xizhi_tree
      - xizhi_glob_files
      - webfetch

  chongzhi:
    name: Chongzhi
    model: gpt-4o-mini
    system_prompt: |
      You are Chongzhi, the coding agent.
      Use the provided file tools (read_file, write_file, modify_file) to
      implement the requested changes inside the user's workspace.
      Return a concise summary of what you changed when done.
    max_tokens: 4096
    tools:
      - xizhi_read_file
      - xizhi_write_file
      - xizhi_modify_file
      - xizhi_list_files
      - xizhi_tree
      - xizhi_glob_files
      - webfetch

  liang:
    name: Liang
    model: gpt-4o-mini
    system_prompt: |
      You are Liang, the analysis agent.
      Read the provided context and produce a clear, structured analysis.
      You do not have file tools; rely on the context given to you.
    max_tokens: 2048
    tools:
      - xizhi_list_files
      - xizhi_tree
      - xizhi_glob_files
      - webfetch

tools:
  xizhi:
    read:
      enabled: true
    write:
      enabled: true
    modify:
      enabled: true
    list_files:
      enabled: true
    tree:
      enabled: true
    glob_files:
      enabled: true
  webfetch:
    enabled: true
    timeout: 30s

# External MCP servers. Tools discovered from these servers are registered in
# the process-wide tool registry and exposed through GET /api/v1/mcp/tools.
# Only explicitly-configured servers are connected; there is no runtime
# discovery.
#
# Transport types:
#   sse   - connects to a remote MCP server over SSE + HTTP POST messages.
#   stdio - spawns a local command and speaks JSON-RPC over stdin/stdout.
#
# Authentication:
#   SSE auth uses the headers map (supports ${VAR} substitution).
#   stdio auth uses the env map, injected into the child environment.
#
# Fields:
#   name         - required, unique identifier for this server.
#   transport    - required, "sse" or "stdio".
#   url          - required for sse; server endpoint.
#   command      - required for stdio; executable to spawn.
#   args         - optional command-line arguments for stdio.
#   env          - optional environment variables for stdio.
#   headers      - optional HTTP headers for sse.
#   timeout      - optional connection / initialization timeout (default 30s).
#   call_timeout - optional per-tool-call timeout (default 30s).
#   reconnect    - optional, attempt reconnect/restart on failure.
#   prefix       - optional prefix applied to every discovered tool name.
mcp:
  servers:
    - name: remote_search
      transport: sse
      url: http://localhost:3001/sse
      headers:
        Authorization: Bearer ${MCP_TOKEN}
      timeout: 30s
      call_timeout: 30s
      reconnect: true

    - name: local_calculator
      transport: stdio
      command: ./calculator-mcp-server
      args: ["--stdio"]
      env:
        API_KEY: ${LOCAL_API_KEY}
      timeout: 30s
      call_timeout: 30s
      reconnect: true

logging:
  level: info
  format: json
